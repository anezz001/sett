<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<!-- NO ZOOM DI HALAMAN UTAMA -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>NEON CARD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* NO GESER */
html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

/* HALAMAN CARD */
#cardPage{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card{
    width:360px;
    max-width:100%;

    background:#050505;

    border:2px solid #39ff14;
    border-radius:28px;

    overflow:hidden;

    box-shadow:
    0 0 15px #39ff14,
    0 0 35px #39ff14;
}

/* FOTO */
.foto{
    width:100%;
    height:260px;

    object-fit:cover;
    display:block;

    border-bottom:2px solid #39ff14;

    cursor:pointer;
}

/* ISI */
.content{
    padding:25px;
    text-align:center;
}

/* JUDUL */
.judul{
    color:#39ff14;
    font-size:35px;
    font-weight:bold;

    text-shadow:
    0 0 10px #39ff14,
    0 0 20px #39ff14;

    margin-bottom:12px;
}

/* TEKS */
.desk{
    color:white;
    font-size:20px;
    margin-bottom:25px;
}

/* BUTTON */
.btn{
    display:inline-block;

    background:#39ff14;
    color:black;

    padding:16px 40px;

    font-size:22px;
    font-weight:bold;

    border-radius:18px;

    text-decoration:none;

    box-shadow:
    0 0 15px #39ff14,
    0 0 35px #39ff14;

    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* FULL FOTO */
#fullPage{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:black;

    display:none;

    justify-content:center;
    align-items:center;

    overflow:auto;

    z-index:999;
}

/* FOTO FULL DI TENGAH */
#fullImage{
    max-width:100%;
    max-height:100%;

    object-fit:contain;

    display:block;
    margin:auto;
}

/* TOMBOL CLOSE */
.close{
    position:fixed;
    top:20px;
    right:20px;

    background:#39ff14;
    color:black;

    border:none;

    padding:10px 18px;

    font-size:18px;
    font-weight:bold;

    border-radius:12px;

    cursor:pointer;

    z-index:1000;

    box-shadow:
    0 0 10px #39ff14,
    0 0 20px #39ff14;
}

</style>
</head>
<body>

<!-- CARD -->
<div id="cardPage">

    <div class="card">

        <!-- FOTO -->
        <img src="https://i.top4top.io/p_37950zmde0.jpg" class="foto" onclick="openFoto()">

        <!-- TEXT -->
        <div class="content">

            <div class="judul">
                SET PEPENG
            </div>

            <div class="desk">
                DPI:600 • TOTEM:45 • DRAK :bebas
            </div>

            <!-- BUTTON -->
            <a href="https://anezz001.github.io/TEOMRI/APKTOR" class="btn">
                KELUAR 
            </a>

        </div>

    </div>

</div>

<!-- FULL FOTO -->
<div id="fullPage">

    <button class="close" onclick="closeFoto()">
        X
    </button>

    <!-- FOTO BISA ZOOM -->
    <img src="https://i.top4top.io/p_37950zmde0.jpg" id="fullImage">

</div>

<script>

function openFoto(){
    document.getElementById("fullPage").style.display = "flex";

    /* IZININ ZOOM */
    document.querySelector('meta[name="viewport"]')
    .setAttribute(
        "content",
        "width=device-width, initial-scale=1.0"
    );
}

function closeFoto(){
    document.getElementById("fullPage").style.display = "none";

    /* BALIK NO ZOOM */
    document.querySelector('meta[name="viewport"]')
    .setAttribute(
        "content",
        "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    );
}

</script>

</body>
</html>
